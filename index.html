            "text": "Le rendement locatif brut à Dubaï est en moyenne de 6 à 9% par an selon le quartier et le type de bien. Les studios en location courte durée (Airbnb) dans des zones comme JVC ou Business Bay atteignent 7 à 9%. Les appartements 2 chambres en location longue durée génèrent 5,5 à 7%. À titre de comparaison, le rendement moyen en France est de 3 à 4%."
          }
        },
        {
          "@type": "Question",
          "name": "Comment investir dans l'immobilier à Dubaï depuis la France ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pour investir dans l'immobilier à Dubaï depuis la France, il faut : 1) Choisir une zone franche ou freehold (Marina, Downtown, JVC, Business Bay, Palm Jumeirah) ouverte aux étrangers, 2) Sélectionner un bien via un agent agréé RERA, 3) Signer un MOU (Memorandum of Understanding), 4) Ouvrir un compte bancaire aux EAU ou utiliser un virement SWIFT, 5) Signer devant le DLD (Dubai Land Department). Aucun prêt immobilier français n'est possible sur Dubai, mais des banques locales comme Emirates NBD proposent des crédits aux non-résidents."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la fiscalité pour un investisseur français à Dubaï ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dubaï ne prélève aucun impôt sur les revenus locatifs, aucune taxe sur la plus-value immobilière, et aucun impôt sur les successions. Pour un résident fiscal français, les revenus locatifs de Dubaï doivent être déclarés en France et sont imposés selon le barème progressif de l'IR (jusqu'à 45%) + prélèvements sociaux (17,2%). En revanche, si vous devenez résident fiscal aux EAU (183 jours), vous ne payez aucun impôt. La convention fiscale France-EAU signée en 1989 évite la double imposition."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce que le visa or (Golden Visa) de Dubaï ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le Golden Visa des Émirats Arabes Unis est un visa de résidence de 10 ans renouvelable accordé aux investisseurs immobiliers. Depuis 2022, il est accessible à partir d'un investissement immobilier de 2 millions AED (environ 545 000€) dans un bien freehold. Il confère la résidence permanente aux EAU, l'accès au système bancaire local, la scolarisation des enfants et peut mener à une résidence fiscale aux EAU (0% d'impôt)."
          }
        },
        {
          "@type": "Question",
          "name": "Quels sont les meilleurs quartiers pour investir à Dubaï ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les meilleurs quartiers pour investir à Dubaï en 2025 sont : 1) Jumeirah Village Circle (JVC) — rendement 7-9%, prix accessibles (150 000-350 000€), forte demande locative, 2) Business Bay — liquidité haute, proximité Downtown, rendement 6-7,5%, 3) Dubai Marina — premium, liquidité maximale, idéal pour revente, 4) Downtown Dubai — prestige, stabilité, faible risque, 5) Dubai Creek Harbour — quartier en développement, potentiel de plus-value 20-30% à 5 ans, 6) Palm Jumeirah — ultra-premium, rendement 5-6% mais valorisation exceptionnelle."
          }
        },
        {
          "@type": "Question",
          "name": "Vaut-il mieux acheter du neuf (off-plan) ou de l'ancien à Dubaï ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'off-plan (neuf en construction) à Dubaï offre des prix 15-30% inférieurs au marché, des plans de paiement fractionnés (souvent 60/40 ou 50/50 avec le promoteur), et un potentiel de plus-value important à la livraison. L'ancien (prêt) offre des revenus locatifs immédiats et zéro risque de retard de livraison. Pour un premier investissement, l'ancien est recommandé pour sa visibilité. L'off-plan convient à un horizon 3-5 ans avec une part de plus-value dans l'objectif."
          }
        },
        {
          "@type": "Question",
          "name": "Quels sont les risques d'investir dans l'immobilier à Dubaï ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les principaux risques d'investissement immobilier à Dubaï sont : 1) Risque de change (AED/EUR) — l'AED est indexé au dollar, toute baisse de l'EUR/USD amplifie les rendements en euros, 2) Risque promoteur pour l'off-plan — choisir un promoteur agréé RERA et vérifier le compte escrow, 3) Risque de suroffre — certains quartiers ont une offre future importante (vérifier les permis de construire), 4) Risque géopolitique régional — atténué par la neutralité des EAU, 5) Charges de copropriété — les service charges annuels sont de 10-25€/m² et réduisent le rendement net."
          }
        },
        {
          "@type": "Question",
          "name": "Comment calculer la rentabilité d'un investissement immobilier à Dubaï ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La rentabilité brute à Dubaï se calcule : (loyer annuel / prix d'achat) × 100. Pour la rentabilité nette, il faut déduire : les service charges (10-25€/m²/an), la commission d'agence location (5% du loyer annuel), les frais DLD à l'achat (4% du prix + 580 AED admin), et la taxe municipale sur le loyer (5% pour les locataires). Notre simulateur IA intègre tous ces paramètres pour un calcul précis selon votre profil d'investisseur."
          }
        }
      ]
    }
